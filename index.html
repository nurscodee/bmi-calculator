<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bmi-card">
      <h2>BMI Calculator</h2>

      <div class="input-group">
        <label for="weight">Weight (kg)</label>
        <input
          type="number"
          id="weight"
          placeholder="Example: 70"
          min="1"
          step="0.1"
        />
      </div>

      <div class="input-group">
        <label for="height">Height (cm)</label>
        <input type="number" id="height" placeholder="Example: 175" min="1" />
      </div>

      <button id="calculate-btn">Calculate</button>

      <div id="result-section" class="result-container">
        <div class="result-box">
          <span class="label">Your BMI</span>
          <span id="bmi-value" class="value">--.-</span>
        </div>
        <div class="result-box">
          <span class="label">Status</span>
          <span id="bmi-status" class="value status-text">--</span>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
